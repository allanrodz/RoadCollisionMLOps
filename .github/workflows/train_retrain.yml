name: Continuous Training - Retrain and Register Model

on:
  workflow_dispatch:
  schedule:
    - cron: "42 3 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  train-register-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run acquisition, validation and feature engineering
        env:
          DATA_URL: ${{ secrets.DATA_URL }}
        run: |
          if [ -n "${DATA_URL}" ]; then
            python -m src.ingest --data-url "${DATA_URL}"
          else
            echo "DATA_URL secret not set. Using bundled ROA17 data for demonstration."
            python -m src.ingest --use-bundled
          fi
          python -m src.validate_data
          python -m src.features

      - name: Train candidates and log with MLflow
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
          MLFLOW_EXPERIMENT_NAME: road-collision-forecasting
          REGISTER_MODEL: "true"
        run: python -m src.train --register

      - name: Run tests after training
        run: pytest -q

      - name: Upload MLflow and model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-and-mlflow-runs
          path: |
            model/*
            mlflow.db
            mlruns/**

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "${IMAGE_NAME}:latest" -t "${IMAGE_NAME}:${GITHUB_SHA}" .
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          echo "Pushed ${IMAGE_NAME}:latest and ${IMAGE_NAME}:${GITHUB_SHA}"
