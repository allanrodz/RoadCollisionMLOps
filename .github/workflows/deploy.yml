name: Continuous Deployment - Google VM

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Continuous Training - Retrain and Register Model"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GCP_VM_SSH_KEY }}" > ~/.ssh/gcp_vm_key
          chmod 600 ~/.ssh/gcp_vm_key
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/gcp_vm_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "whoami && docker --version && docker compose version"

      - name: Deploy Docker Compose stack to VM
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_SSH_KEY_PATH: /home/runner/.ssh/gcp_vm_key
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
        run: |
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          export IMAGE_NAME="$IMAGE_NAME_LOWER"
          bash scripts/deploy_vm.sh

      - name: Smoke test deployed API
        env:
          API_BASE_URL: http://${{ secrets.GCP_VM_HOST }}:5000
        run: bash scripts/smoke_test.sh