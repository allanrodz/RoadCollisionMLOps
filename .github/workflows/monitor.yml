name: Continuous Monitoring - API Health

on:
  workflow_dispatch:
  schedule:
    - cron: "10 8 * * *"

permissions:
  contents: read
  issues: write

jobs:
  monitor-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monitoring check
        id: monitor_check
        continue-on-error: true
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: python -m src.monitor --base-url "${API_BASE_URL}"

      - name: Open GitHub issue on monitoring failure
        if: steps.monitor_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Monitoring alert: road collision API failed ${new Date().toISOString()}`;
            const body = `The scheduled monitoring workflow could not successfully call the deployed Flask API. Check the VM, Docker containers, API health endpoint, Prometheus metrics and deployment logs.`;
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});

      - name: Fail workflow if monitoring failed
        if: steps.monitor_check.outcome == 'failure'
        run: exit 1
