name: CI - Test and Build

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check src app tests

      - name: Run data pipeline on bundled ROA17 data
        run: |
          python -m src.ingest --use-bundled
          python -m src.validate_data
          python -m src.features

      - name: Train smoke-test model without registry
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
          REGISTER_MODEL: "false"
        run: python -m src.train --no-register

      - name: Run unit tests
        run: pytest -q

      - name: Docker build smoke test
        run: docker build -t road-collision-api:test .
