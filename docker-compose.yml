services:
  road-collision-api:
    build: .
    image: ${IMAGE_NAME:-road-collision-api:latest}
    container_name: road-collision-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MODEL_DIR: model
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: road-collision-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - road-collision-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: road-collision-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped
